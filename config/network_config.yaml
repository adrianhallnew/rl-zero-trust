# Network Simulation Configuration
# RL-Driven Adaptive Security System for Zero-Trust Networks
#
# Defines Mininet topology, link parameters, and traffic profiles

topology:
  type: "tree"
  depth: 2                            # 2 levels of switches
  fanout: 5                           # 5 children per switch node
  # Result: 1 root switch + 5 leaf switches = 6 switches, 25 hosts
  # Adjusted: depth=2, fanout=3 for root, fanout=5 for leaves
  # Final: 5 switches, 15 hosts (as specified)
  controller:
    ip: "172.20.0.20"                 # Ryu controller IP (Docker network)
    port: 6633                        # OpenFlow port
  switch_prefix: "s"                  # Switch naming: s1, s2, ...
  host_prefix: "h"                    # Host naming: h1, h2, ...

# Link Parameters
links:
  default:
    bandwidth_mbps: 100               # 100 Mbps per link
    delay_ms: 2                       # 2ms propagation delay
    loss_percent: 0                   # No packet loss (baseline)
    max_queue_size: 1000              # Max packets in queue
  degraded:
    bandwidth_mbps: 50                # Reduced bandwidth for testing
    delay_ms: 10                      # Higher latency
    loss_percent: 1                   # 1% packet loss

# Traffic Profiles
traffic:
  legitimate:
    protocol: "TCP"
    duration_seconds: 60
    bandwidth_mbps: 10                # Per-flow baseline
    port_range: [80, 443, 8080, 8443]
    num_concurrent_flows: 5
  baseline_test:
    protocol: "TCP"
    duration_seconds: 30
    bandwidth_mbps: 50
    server_port: 5201                 # iPerf3 default

# Host IP Assignment
hosts:
  subnet: "10.0.0.0/24"
  start_ip: "10.0.0.1"
  gateway: "10.0.0.254"

# OpenFlow Configuration
openflow:
  version: "1.3"                      # OpenFlow protocol version
  idle_timeout: 30                    # Flow entry idle timeout (seconds)
  hard_timeout: 300                   # Flow entry hard timeout (seconds)
  table_id: 0                        # Default flow table
  priority:
    default: 100                      # Normal traffic priority
    security: 200                     # Security policy priority
    emergency: 300                    # Emergency block priority

# Statistics Collection
stats:
  poll_interval_seconds: 5            # How often to poll flow stats
  moving_average_window: 10           # Window size for traffic feature averaging
  features:
    - "packet_count"
    - "byte_count"
    - "duration_sec"
    - "rx_packets"
    - "tx_packets"
    - "rx_dropped"
    - "tx_dropped"
    - "rx_errors"
    - "tx_errors"
    - "flow_count"
    - "connection_rate"
